# Project type categorization rules.
#
# Each category has keywords (matched against name, description, topics)
# and topics (matched against GitHub topics).
# Higher weight = stronger signal. Category with highest cumulative score wins.
# Order in this file is the tie-break priority (earlier wins).

categories:
