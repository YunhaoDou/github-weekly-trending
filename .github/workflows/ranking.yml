name: Weekly ranking

on:
  schedule:
    - cron: '0 2 * * 1'   # 02:00 UTC Monday (after Sunday snapshot)
  workflow_dispatch:

jobs:
  ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyyaml

      - name: Generate README
        run: python scripts/ranking.py

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "ranking: update weekly trending [skip ci]"
            git push
          else
            echo "No ranking change."
          fi
