name: Daily snapshot

on:
  schedule:
    - cron: '0 0 * * *'   # 00:00 UTC every day
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pyyaml

      - name: Snapshot
        run: python scripts/snapshot.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune snapshots older than 90 days
        run: |
          find snapshots -name "*.json" -mtime +90 -print -delete || true

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add snapshots/
            git commit -m "snapshot: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No snapshot change."
          fi
